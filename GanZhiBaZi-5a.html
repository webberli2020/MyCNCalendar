<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>干支历手机版</title>
    <style>
        :root { --accent: #c0392b; --btn-bg: #f0f2f5; --text: #2c3e50; }
        body { font-family: -apple-system, system-ui, sans-serif; background: #f8f9fa; margin: 0; display: flex; justify-content: center; padding-top: 20px; }
        
        .container { background: #fff; width: 95%; max-width: 500px; border-radius: 20px; box-shadow: 0 8px 30px rgba(0,0,0,0.05); padding: 20px; box-sizing: border-box; }
        h2 { text-align: center; color: var(--text); font-size: 1.4rem; margin-bottom: 20px; }

        /* 移动端友好的单行控件排版 */
        .controls-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px; }
        
        .stepper-box { display: flex; flex-direction: column; align-items: center; gap: 5px; }
        .stepper-box label { font-size: 13px; color: #999; font-weight: bold; }
        
        .stepper { 
            display: flex; align-items: center; background: var(--btn-bg); 
            border-radius: 10px; width: 100%; height: 45px; overflow: hidden;
        }
        .stepper button {
            width: 40px; height: 100%; border: none; background: transparent;
            font-size: 1.2rem; color: var(--text); cursor: pointer; transition: background 0.2s;
            -webkit-tap-highlight-color: transparent;
        }
        .stepper button:active { background: #e2e4e7; }
        
        .stepper input {
            flex: 1; width: 100%; border: none; background: transparent;
            text-align: center; font-size: 1.1rem; font-weight: bold; color: var(--text);
            outline: none; -moz-appearance: textfield;
        }
        .stepper input::-webkit-outer-spin-button, 
        .stepper input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }

        /* 结果显示区 */
        .gz-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
        .pillar { 
            background: #fff5f5; border: 1px solid #f9e1e1; border-radius: 12px; 
            padding: 12px 0; text-align: center;
        }
        .p-label { font-size: 11px; color: #a5a5a5; margin-bottom: 4px; }
        .p-val { font-size: 1.4rem; font-weight: 800; color: var(--accent); }

        .footer { text-align: center; margin-top: 20px; font-size: 12px; color: #bdc3c7; }
    </style>
</head>
<body>

<div class="container">
    <h2>干支校对 (移动版)</h2>

    <div class="controls-grid">
        <div class="stepper-box">
            <label>年份</label>
            <div class="stepper">
                <button onclick="change('year', -1)">-</button>
                <input type="number" id="year" value="2026" oninput="reCalculate()">
                <button onclick="change('year', 1)">+</button>
            </div>
        </div>
        <div class="stepper-box">
            <label>月份</label>
            <div class="stepper">
                <button onclick="change('month', -1)">-</button>
                <input type="number" id="month" value="3" oninput="reCalculate()">
                <button onclick="change('month', 1)">+</button>
            </div>
        </div>
        <div class="stepper-box">
            <label>日期</label>
            <div class="stepper">
                <button onclick="change('day', -1)">-</button>
                <input type="number" id="day" value="11" oninput="reCalculate()">
                <button onclick="change('day', 1)">+</button>
            </div>
        </div>
        <div class="stepper-box">
            <label>时辰</label>
            <div class="stepper">
                <button onclick="change('hour', -1)">-</button>
                <input type="number" id="hour" value="14" oninput="reCalculate()">
                <button onclick="change('hour', 1)">+</button>
            </div>
        </div>
    </div>

    <div class="gz-row">
        <div class="pillar"><div class="p-label">年柱</div><div id="gz-y" class="p-val">--</div></div>
        <div class="pillar"><div class="p-label">月柱</div><div id="gz-m" class="p-val">--</div></div>
        <div class="pillar"><div class="p-label">日柱</div><div id="gz-d" class="p-val">--</div></div>
        <div class="pillar"><div class="p-label">时柱</div><div id="gz-h" class="p-val">--</div></div>
    </div>

    <div class="footer" id="summary">点击按钮或数字进行调节</div>
</div>

<script>
    const TANS = "甲乙丙丁戊己庚辛壬癸";
    const ZHIS = "子丑寅卯辰巳午未申酉戌亥";

    // 初始化
    window.onload = () => {
        const now = new Date();
        document.getElementById('year').value = now.getFullYear();
        document.getElementById('month').value = now.getMonth() + 1;
        document.getElementById('day').value = now.getDate();
        document.getElementById('hour').value = now.getHours();
        reCalculate();
    };

    // 增减调节函数
    function change(id, delta) {
        const input = document.getElementById(id);
        let val = parseInt(input.value) || 0;
        input.value = val + delta;
        reCalculate();
    }

    function reCalculate() {
        const y = parseInt(document.getElementById('year').value) || 2026;
        const m = parseInt(document.getElementById('month').value) || 1;
        const d = parseInt(document.getElementById('day').value) || 1;
        const h = parseInt(document.getElementById('hour').value) || 0;

        // 利用 Date 对象自动处理日期溢出 (例如2月30日会自动转为3月2日)
        const date = new Date(y, m - 1, d, h);
        
        // 更新显示（修正用户输入）
        if (document.activeElement.type !== 'number') {
            document.getElementById('year').value = date.getFullYear();
            document.getElementById('month').value = date.getMonth() + 1;
            document.getElementById('day').value = date.getDate();
            document.getElementById('hour').value = date.getHours();
        }

        // --- 干支算法 ---
        let yIdx = (date.getFullYear() - 4) % 60;
        if (yIdx < 0) yIdx += 60;
        const yearGZ = TANS[yIdx % 10] + ZHIS[yIdx % 12];

        const base = new Date(1900, 0, 31);
        const diff = Math.floor((date.getTime() - base.getTime()) / 86400000);
        let dIdx = (diff + 40) % 60;
        if (dIdx < 0) dIdx += 60;
        const dayGZ = TANS[dIdx % 10] + ZHIS[dIdx % 12];

        const yGanIdx = (date.getFullYear() - 4) % 10;
        const mGanStart = (yGanIdx % 5) * 2 + 2; 
        const monthGZ = TANS[(mGanStart + date.getMonth()) % 10] + ZHIS[(date.getMonth() + 2) % 12];

        const dGanIdx = dIdx % 10;
        const hZhiIdx = Math.floor((date.getHours() + 1) / 2) % 12;
        const hourGZ = TANS[((dGanIdx % 5) * 2 + hZhiIdx) % 10] + ZHIS[hZhiIdx];

        document.getElementById('gz-y').innerText = yearGZ;
        document.getElementById('gz-m').innerText = monthGZ;
        document.getElementById('gz-d').innerText = dayGZ;
        document.getElementById('gz-h').innerText = hourGZ;

        document.getElementById('summary').innerText = `已校对：${date.getFullYear()}年${date.getMonth()+1}月${date.getDate()}日 ${date.getHours()}时`;
    }
</script>

</body>
</html>
